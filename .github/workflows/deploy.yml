name: Deploy documents-service to GCP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            echo "🚀 Starting Deployment for documents-service..."
            cd ~/documents-service
            git pull
            cd ~/al-mizan-deployment
            sudo docker-compose up -d --build documents-service
            echo "✅ Deployment Successful!"
