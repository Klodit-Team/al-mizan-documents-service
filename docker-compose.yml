services:
  document-service:
    build: .
    container_name: al-mizan-document-service
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      NODE_ENV: production
      # Base de données propre au Document Service
      DATABASE_URL: postgresql://postgres:password@document-postgres:5432/document_db

      # Infrastructure partagée (via al-mizan-network)
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: al-mizan-docs

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: "redis://redis:6379"

      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"

      PRESIGNED_URL_TTL_SECONDS: "300"
      UPLOAD_MAX_FILE_SIZE: "52428800"
    depends_on:
      document-postgres:
        condition: service_started
    restart: unless-stopped
    networks:
      - al-mizan-network

  # Base de données dédiée au Document Service (chaque microservice a la sienne)
  document-postgres:
    image: postgres:15-alpine
    container_name: al-mizan-document-postgres
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - document-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d document_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - al-mizan-network

volumes:
  document-postgres-data:
    name: al-mizan-document-postgres-data

networks:
  al-mizan-network:
    name: al-mizan-network
    external: true
