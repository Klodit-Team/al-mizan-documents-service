services:
  document-service:
    build: .
    container_name: al-mizan-document-service
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      NODE_ENV: development
      # CHANGEMENT : Utilisation de MySQL
      DATABASE_URL: "mysql://root:root@document-db-mysql:3306/document_db"

      # Infrastructure partagée (MinIO)
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: al-mizan-docs

      # CHANGEMENT : Utilisation de redis-cache
      REDIS_HOST: redis-cache
      REDIS_PORT: "6379"
      REDIS_URL: "redis://redis-cache:6379"

      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"

      PRESIGNED_URL_TTL_SECONDS: "300"
      UPLOAD_MAX_FILE_SIZE: "52428800"
    depends_on:
      document-db-mysql:
        condition: service_started
    restart: unless-stopped
    networks:
      - al-mizan-network

  # CHANGEMENT : Base de données MySQL dédiée au Document Service
  document-db-mysql:
    image: mysql:8.0
    container_name: al-mizan-document-db-mysql
    environment:
      MYSQL_DATABASE: document_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - document-mysql-data:/var/lib/mysql
    ports:
      - "3308:3306" # Port 3308 sur ton PC pour éviter les conflits
    networks:
      - al-mizan-network

volumes:
  document-mysql-data:
    name: al-mizan-document-mysql-data

networks:
  al-mizan-network:
    name: al-mizan-network
    external: true