version: '3.8'

services:
  document-service:
    build: .
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/document_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: document_db
      DB_USER: postgres
      DB_PASSWORD: password
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: al-mizan-docs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRESIGNED_URL_TTL_SECONDS: "300"
      UPLOAD_MAX_FILE_SIZE: "52428800"
    depends_on:
      - postgres
      - minio
      - redis
    networks:
      - al-mizan-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - al-mizan-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - al-mizan-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - al-mizan-network

volumes:
  postgres-data:
  minio-data:
  redis-data:

networks:
  al-mizan-network:
    driver: bridge
